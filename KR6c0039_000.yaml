front:
  text: 刊行金剛般若經贊述序般若六百卷以金剛為精髓所謂深妙玄約群聖猶迷非虛言也在昔無著稟偈於彌勒天親受旨乎賢兄二論之出世譬之猶雙懸日月燭照幽冥也及法之東漸也翻譯注疏其類實繁傳説我三藏法師是常啼菩薩之後身信乎其執破骨出髓之夙志忘軀殉法委運祈通其譯諸經託終於此法以大呈嘉瑞及其上遷也亦誦真文以逝其有大因緣於般若而獨得其宗旨者可以見已而於本經最注意焉是以疏主受旨特述三注曰玄記曰贊述曰會釋而其直就經文為釋者獨贊述為然然人徒知有此書而莫之或目也況能研索之乎越前藝公嘗有歎於此欲上梓行世搜索四方得五本焉既已參互校訂之矣念我興福更有善本癸酉之夏來謀之余余嘉其志出一本相示蓋學頭所歷傳藝公大喜持去至於季秋再來告其讎對卒業乞余題語余深懼以鄙言冠祖典不遜之罪不可逃也固辭不敢乙亥之夏刻竣復持至求豫必一言以證考訂無私豫感其篤志且喜法之弘傳也乃忘僣越略敘來由以塞其責云文化十二年歲在乙亥夏五日興福別室大僧都訓映謹識刻金剛般若經贊述序我曹衆生從無始際汩溺於生死海中頭出頭沒靡有出期大聖世尊憫之宣暢摩訶衍法於中演説破有之教者摩訶般若經四處十六會説而此金剛般若者其第二處第九會説實是覺海之要津入道之寶戶也是以支那日本諸大德疏此經者僧肇淨影等無慮數十家本朝鏤梓行世者亦頗多矣唯大唐慈恩窺基法師有疏二卷東域録中稱贊述者傳本邦以來蓋千有餘年而未梓行于世學者憾之豈非缺乎余同國社友丹山子法諱順藝者天資聰敏好學甚篤遊學本黌有年于茲慨此典未現流於世探其善本刻苦校讎頗延歲月旁加邦讀付諸剞劂氏將上木令余作序余雖不敏曷不喜此典流後代布海內乎且茲經天台宗祖智者大師有疏一卷華嚴宗祖至相大師有疏二卷三論宗祖吉藏法師有疏四卷今此書即法相宗祖基法師之所撰則四家大乘師之疏得此而恰完矣竊思我社諸子依此經疏研尋則一乘三乘教義性相二宗法門坐而得之是余深所冀也丹山子此舉亦茲意耳因不恥鄙拙聊述開刻之事緣以辨其簡端云爾維歲文化十年癸酉仲冬閏月越州香月院釋深厲志于京兆高倉學寮校訂例言六則斯書余所索得凡六本其三是南都古本而興福寺學頭歷傳本又其最可據者故今以此為主以參訂餘本其涉兩可者則並存之又雖可疑而諸本皆同者則姑從原文不敢臆斷且揭注之上方更俟善本本經新翻未容潤飾故此疏就什譯以解之蓋以其譯在初流傳最廣耳然有什本所闕一二以餘本補之者今圈其右方而注之於格上此疏所牒經文每舉其首尾略去中間今就現藏補填全文以便撿閲本經諸家所刊行有數本今直就大藏抽出本經讎之於疏所牒挍其同異大藏又參訂宋本明本麗本焉並揭注之上方如疏中所引二論文又有不同前三本者非其所正釋故不煩加挍注觀者當自撿知之余所得六本皆略有國訓而莫全備者今請典壽律匠撿閲之參訂合議悉附邦讀以便初學更見古點本可依者當是正之凡上梓者必借書手而往往不免脫謬今余不自揣書之拙親寫繕完以授剞劂雖缺於觀美庶不致誤人文化十年癸酉冬十月丹山野衲順藝志道謹識
